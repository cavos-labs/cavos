name: Sync JWKS

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-jwks
  cancel-in-progress: false

jobs:
  sync:
    name: Sync JWKS keys
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Call JWKS sync endpoint
        env:
          SYNC_JWKS_URL: ${{ secrets.SYNC_JWKS_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          curl -fLsS --max-time 120 -X POST "$SYNC_JWKS_URL" \
            -H "x-admin-key: $ADMIN_API_KEY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: cavos-web/package-lock.json

      - name: Install cavos-web dependencies
        working-directory: cavos-web
        run: npm ci

      - name: Refresh slot JWKS on Katana
        run: node .github/scripts/update_slot_jwks.js

      - name: Upload slot JWKS summary
        uses: actions/upload-artifact@v4
        with:
          name: slot-jwks-update-summary
          path: slot-jwks-update-summary.json
