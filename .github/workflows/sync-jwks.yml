name: Sync JWKS

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-jwks
  cancel-in-progress: false

jobs:
  sync:
    name: Sync JWKS keys
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call JWKS sync endpoint
        env:
          SYNC_JWKS_URL: ${{ secrets.SYNC_JWKS_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          curl -fLsS --max-time 120 -X POST "$SYNC_JWKS_URL" \
            -H "x-admin-key: $ADMIN_API_KEY"
